<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kay — Math Tutor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="https://www.desmos.com/api/v1.9/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1a1814; --ink-2: #4a4640; --ink-3: #8a857e;
  --paper: #faf8f4; --paper-2: #f2ede5; --paper-3: #e8e0d4;
  --accent: #c4602a; --accent-2: #e8956a;
  --kay-bg: #2e2a25; --kay-text: #f5f0e8;
  --radius: 14px;
  --mono: 'DM Mono', monospace; --sans: 'DM Sans', sans-serif; --serif: 'DM Serif Display', serif;
}
html, body { height: 100%; font-family: var(--sans); background: var(--paper); color: var(--ink); -webkit-font-smoothing: antialiased; }

/* ── Layout ── */
.app { display: grid; grid-template-columns: 260px 1fr; height: 100vh; height: 100dvh; overflow: hidden; }

/* ── Sidebar ── */
.sidebar { background: #2e2a25; color: var(--kay-text); display: flex; flex-direction: column; padding: 24px 18px 20px; border-right: 1px solid rgba(255,255,255,0.06); overflow: hidden; }
.kay-name { font-family: var(--serif); font-size: 26px; color: #f5f0e8; letter-spacing: -0.5px; line-height: 1; }
.kay-title { font-size: 10px; color: rgba(245,240,232,0.4); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px; }
.sidebar-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 20px 0 18px; }
.sidebar-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(245,240,232,0.3); font-weight: 500; margin-bottom: 8px; }
.sessions { flex: 1; overflow-y: auto; scrollbar-width: none; }
.sessions::-webkit-scrollbar { display: none; }
.session-item { padding: 9px 10px; border-radius: 7px; cursor: pointer; margin-bottom: 2px; font-size: 12px; color: rgba(245,240,232,0.55); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: background 0.15s; }
.session-item:hover { background: rgba(255,255,255,0.06); color: rgba(245,240,232,0.9); }
.session-item.active { background: rgba(196,96,42,0.25); color: #f5f0e8; }
.new-session-btn { display: flex; align-items: center; gap: 7px; width: 100%; padding: 9px 10px; background: rgba(196,96,42,0.15); border: 1px solid rgba(196,96,42,0.3); border-radius: 7px; color: var(--accent-2); font-family: var(--sans); font-size: 12px; cursor: pointer; transition: all 0.15s; margin-bottom: 14px; }
.new-session-btn:hover { background: rgba(196,96,42,0.25); }

/* ── Main ── */
.main { display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; background: var(--paper); }

/* Topbar */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 22px 12px; border-bottom: 1px solid var(--paper-3); flex-shrink: 0; gap: 8px; }
.topic-pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; background: var(--paper-2); border: 1px solid var(--paper-3); border-radius: 20px; font-size: 11px; color: var(--ink-2); min-width: 0; overflow: hidden; }
.topic-pill span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topic-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.topbar-actions { display: flex; gap: 6px; flex-shrink: 0; }
.action-btn { display: flex; align-items: center; gap: 5px; padding: 6px 12px; background: transparent; border: 1px solid var(--paper-3); border-radius: 7px; font-family: var(--sans); font-size: 11px; color: var(--ink-2); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.action-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(196,96,42,0.04); }
.action-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(196,96,42,0.08); }

/* Graph panel */
.graph-panel { background: var(--paper-2); border-bottom: 1px solid var(--paper-3); flex-shrink: 0; overflow: hidden; transition: height 0.3s ease; height: 0; }
.graph-panel.open { height: 300px; }
.graph-inner { display: flex; height: 100%; }
.graph-container { flex: 1; }
#desmos-calc { width: 100%; height: 100%; }
.graph-sidebar { width: 200px; border-left: 1px solid var(--paper-3); padding: 12px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
.graph-sidebar-title { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 2px; }
.graph-expr-list { display: flex; flex-direction: column; gap: 4px; }
.graph-expr-item { font-size: 11px; color: var(--ink-2); background: var(--paper); border: 1px solid var(--paper-3); border-radius: 5px; padding: 5px 8px; cursor: pointer; font-family: var(--mono); transition: border-color 0.15s; }
.graph-expr-item:hover { border-color: var(--accent); color: var(--accent); }
.graph-clear-btn { margin-top: auto; padding: 6px; background: none; border: 1px solid var(--paper-3); border-radius: 6px; font-family: var(--sans); font-size: 11px; color: var(--ink-3); cursor: pointer; transition: all 0.15s; }
.graph-clear-btn:hover { border-color: var(--ink-3); color: var(--ink-2); }

/* Messages */
.messages { flex: 1; overflow-y: auto; padding: 22px 22px 10px; scroll-behavior: smooth; }
.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-thumb { background: var(--paper-3); border-radius: 2px; }
.message { display: flex; gap: 12px; margin-bottom: 20px; animation: fadeUp 0.22s ease both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.msg-avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; margin-top: 2px; }
.msg-avatar.kay { background: var(--ink); color: var(--kay-text); font-family: var(--serif); font-size: 14px; }
.msg-avatar.user { background: var(--paper-3); color: var(--ink-2); }
.msg-content { flex: 1; min-width: 0; }
.msg-name { font-size: 10px; font-weight: 500; color: var(--ink-3); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 5px; }
.msg-bubble { font-size: 14px; line-height: 1.75; color: var(--ink); }
.message.user .msg-bubble { background: var(--paper-2); border: 1px solid var(--paper-3); border-radius: 2px 11px 11px 11px; padding: 10px 14px; display: inline-block; max-width: 82%; }
.msg-bubble .katex-display { margin: 10px 0; overflow-x: auto; }
.msg-bubble code { font-family: var(--mono); font-size: 12px; background: var(--paper-2); padding: 1px 5px; border-radius: 3px; color: var(--accent); }

/* ── Message type colour coding ── */
.msg-bubble.is-question {
  border-left: 3px solid #378ADD;
  padding-left: 12px;
  border-radius: 0;
}
.msg-bubble.is-affirmation {
  background: #EAF3DE;
  border-radius: 8px;
  padding: 10px 14px;
}
.msg-type-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 20px;
  margin-left: 6px;
  vertical-align: middle;
  letter-spacing: 0.04em;
}
.badge-question {
  background: #E6F1FB;
  color: #185FA5;
}
.badge-affirmation {
  background: #EAF3DE;
  color: #3B6D11;
}

/* Equation forms panel */
.eq-forms { margin-top: 10px; background: var(--paper-2); border: 1px solid var(--paper-3); border-radius: 10px; overflow: hidden; }
.eq-forms-header { display: flex; border-bottom: 1px solid var(--paper-3); }
.eq-form-tab { flex: 1; padding: 7px 4px; font-size: 10px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-3); background: none; border: none; border-right: 1px solid var(--paper-3); cursor: pointer; transition: all 0.15s; font-family: var(--sans); }
.eq-form-tab:last-child { border-right: none; }
.eq-form-tab.active { background: var(--paper); color: var(--accent); }
.eq-form-tab:hover:not(.active) { color: var(--ink-2); background: rgba(0,0,0,0.02); }
.eq-form-body { padding: 12px 14px; font-size: 13px; min-height: 50px; display: flex; align-items: center; }
.eq-graph-btn { display: flex; align-items: center; gap: 5px; margin-top: 8px; padding: 5px 10px; background: none; border: 1px solid var(--paper-3); border-radius: 6px; font-family: var(--sans); font-size: 11px; color: var(--ink-3); cursor: pointer; transition: all 0.15s; }
.eq-graph-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Typing indicator */
.typing-indicator { display: flex; gap: 12px; margin-bottom: 20px; align-items: flex-start; }
.typing-dots { display: flex; gap: 4px; padding: 12px 4px 4px; align-items: center; }
.typing-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--ink-3); animation: bounce 1.2s ease infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-5px);opacity:1} }

/* Empty state */
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; text-align: center; gap: 10px; }
.empty-name { font-family: var(--serif); font-size: 34px; color: var(--ink); letter-spacing: -0.5px; line-height: 1; }
.empty-sub { font-size: 13px; color: var(--ink-3); max-width: 320px; line-height: 1.6; font-weight: 300; }
.starter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; max-width: 460px; width: 100%; }
.starter-card { padding: 12px 14px; background: var(--paper-2); border: 1px solid var(--paper-3); border-radius: 9px; font-size: 12px; color: var(--ink-2); cursor: pointer; text-align: left; line-height: 1.4; transition: all 0.15s; font-family: var(--sans); }
.starter-card:hover { border-color: var(--accent); color: var(--ink); background: rgba(196,96,42,0.04); }

/* ── Input area ── */
.input-area { flex-shrink: 0; border-top: 1px solid var(--paper-3); }

/* Input bar */
.input-bar { padding: 12px 22px 16px; }
.input-wrap { display: flex; gap: 8px; align-items: flex-end; background: var(--paper-2); border: 1.5px solid var(--paper-3); border-radius: var(--radius); padding: 8px 8px 8px 14px; transition: border-color 0.15s; }
.input-wrap:focus-within { border-color: var(--accent); background: #fff; }
.msg-input { flex: 1; background: none; border: none; outline: none; font-family: var(--sans); font-size: 14px; color: var(--ink); resize: none; max-height: 120px; line-height: 1.6; min-height: 22px; }
.msg-input::placeholder { color: var(--ink-3); }
.input-actions { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
.send-btn { width: 32px; height: 32px; border-radius: 7px; background: var(--ink); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s, transform 0.1s; }
.send-btn:hover { background: var(--accent); }
.send-btn:active { transform: scale(0.93); }
.send-btn:disabled { background: var(--paper-3); cursor: not-allowed; }
.input-hint { font-size: 10px; color: var(--ink-3); margin-top: 6px; text-align: center; }

/* Alert */
.alert { margin: 0 22px 10px; padding: 8px 12px; border-radius: 7px; font-size: 12px; display: none; }
.alert.error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; display: block; }
.alert.info  { background: var(--paper-2); border: 1px solid var(--paper-3); color: var(--ink-2); display: block; }

@media (max-width: 640px) {
  .app { grid-template-columns: 1fr; height: 100vh; height: 100dvh; }
  .sidebar { display: none; }
  .main { height: 100vh; height: 100dvh; }

  /* Topbar — compact single row */
  .topbar { padding: 8px 12px; gap: 6px; }
  .topic-pill { font-size: 10px; max-width: 40vw; padding: 3px 8px; }
  .topbar-actions { gap: 4px; }
  .action-btn { padding: 5px 9px; font-size: 10px; gap: 3px; }
  .action-btn svg { width: 11px; height: 11px; }

  /* Messages */
  .messages { padding: 14px 12px 8px; }
  .msg-bubble { font-size: 13.5px; }
  .message.user .msg-bubble { max-width: 92%; }
  .message { gap: 8px; margin-bottom: 16px; }
  .msg-avatar { width: 26px; height: 26px; font-size: 11px; }

  /* Empty state — much more compact on mobile */
  .empty-state { padding: 20px 16px; gap: 8px; justify-content: flex-start; padding-top: 32px; }
  .empty-name { font-size: 26px; }
  .empty-sub { font-size: 12px; max-width: 100%; }
  .starter-grid { grid-template-columns: 1fr; max-width: 100%; margin-top: 10px; }
  .starter-card { font-size: 12px; padding: 10px 12px; }

  /* Graph panel */
  .graph-panel.open { height: 200px; }
  .graph-sidebar { display: none; }

  /* Input area — pinned to bottom, safe area aware */
  .input-area { flex-shrink: 0; }
  .input-bar { padding: 8px 12px 12px; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
  .input-wrap { padding: 7px 7px 7px 12px; }
  .msg-input { font-size: 16px; } /* 16px prevents iOS auto-zoom on focus */
  .send-btn { width: 34px; height: 34px; }
  .input-hint { display: none; } /* hide on mobile — no keyboard shortcut needed */

  /* Alert */
  .alert { margin: 0 12px 8px; }
}
</style>
</head>
<body>
<div class="app">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div>
      <div class="kay-name">Kay</div>
      <div class="kay-title">Mathematics Tutor</div>
    </div>
    <div class="sidebar-divider"></div>
    <button class="new-session-btn" onclick="newSession()">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New session
    </button>
    <div class="sidebar-label">Recent sessions</div>
    <div class="sessions" id="sessions-list"></div>
  </aside>

  <!-- ── Main ── -->
  <main class="main">

    <!-- Topbar -->
    <div class="topbar">
      <div class="topic-pill">
        <div class="topic-dot"></div>
        <span id="topic-label">Ready to learn</span>
      </div>
      <div class="topbar-actions">
        <button class="action-btn" onclick="sendHint()">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Hint
        </button>
        <button class="action-btn" id="graph-toggle-btn" onclick="toggleGraph()">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Graph
        </button>
        <button class="action-btn" onclick="clearChat()">Clear</button>
      </div>
    </div>

    <!-- Graph panel -->
    <div class="graph-panel" id="graph-panel">
      <div class="graph-inner">
        <div class="graph-container">
          <div id="desmos-calc"></div>
        </div>
        <div class="graph-sidebar">
          <div class="graph-sidebar-title">Expressions</div>
          <div class="graph-expr-list" id="graph-expr-list">
            <div style="font-size:11px;color:var(--ink-3);line-height:1.5">Kay will add equations here automatically, or type one into the graph directly.</div>
          </div>
          <button class="graph-clear-btn" onclick="clearGraph()">Clear graph</button>
        </div>
      </div>
    </div>

    <div id="alert-banner" class="alert"></div>

    <!-- Messages / Empty state -->
    <div id="messages" class="messages" style="display:none"></div>
    <div id="empty-state" class="empty-state">
      <div class="empty-name">Hello, I'm Kay.</div>
      <div class="empty-sub">Your mathematics guide from counting to topology. What are we working through today?</div>
      <div class="starter-grid">
        <button class="starter-card" onclick="sendStarter(this.innerText)">I'm stuck on a problem — can you help me work through it?</button>
        <button class="starter-card" onclick="sendStarter(this.innerText)">Can you explain what a derivative actually means?</button>
        <button class="starter-card" onclick="sendStarter(this.innerText)">I need to understand fractions before moving on</button>
        <button class="starter-card" onclick="sendStarter(this.innerText)">Show me how proof by induction works</button>
      </div>
    </div>

    <!-- Input area -->
    <div class="input-area">

      <div class="input-bar">
        <div class="input-wrap">
          <textarea class="msg-input" id="msg-input"
            placeholder="Ask Kay a question, share your working, or describe where you're stuck…"
            rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <div class="input-actions">
            <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">
              <svg width="14" height="14" fill="none" stroke="white" stroke-width="2.2" viewBox="0 0 24 24">
                <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="input-hint">Enter to send · Shift+Enter for new line</div>
      </div>
    </div>

  </main>
</div>

<script>
// ── System prompt ────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are Kay, a mathematics tutor and learning guide. Your role is not simply to provide answers, but to help students genuinely understand mathematics.

## Personality
You are professionally warm and genuinely curious. You take real interest in understanding what each student already knows, where their thinking breaks down, and what mental model they are building. You are patient, encouraging without being patronising, and intellectually honest.

## Role
You are a facilitator of learning, not a solution dispenser. Guide students to mathematical understanding through questioning, scaffolding, and carefully chosen examples.

## Knowledge scope
You have deep knowledge across all of mathematics from Pre-K through PhD level — numeracy, arithmetic, algebra, geometry, trigonometry, precalculus, calculus, linear algebra, differential equations, real and complex analysis, abstract algebra, topology, probability, statistics, and research-level mathematics.

## Teaching approach
1. Diagnose before teaching — ask a brief question to gauge understanding first.
2. Guide with questions — use the Socratic method.
3. Scaffold carefully — confirm understanding at each step.
4. Use concrete examples first before abstract rules.
5. Name and address confusion directly.
6. Give full solutions sparingly — only after genuine attempts.

## Equation formatting
Always use LaTeX delimiters for all mathematics:
- Use $$...$$ for display equations (centred, on their own line)
- Use $...$ for inline math within a sentence

Examples:
- Inline: The quadratic formula gives $x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}$
- Display: $$\\int_0^\\infty e^{-x^2} dx = \\frac{\\sqrt{\\pi}}{2}$$

## Graphing
You may offer to graph a function or equation by including a JSON block at the END of your response, but ONLY follow these strict rules:

1. Only include a graph block in the FIRST response where a new equation or function is introduced.
2. NEVER include a graph block in any follow-up response in the same conversation thread about the same equation. Once graphed, it is graphed — do not repeat it.
3. If the student asks a follow-up question about the same equation, answer in text only. No graph block.
4. Only include a graph block if visualising the equation directly helps understanding — not for arithmetic, word problems, or algebraic manipulation steps.

Format:
\`\`\`graph
{"expressions": ["y=x^2", "y=2x+1"], "title": "Parabola and line"}
\`\`\`

Use Desmos syntax (e.g. y=x^2, x^2+y^2=25, y=\\sin(x)).

## Equation forms
When a student is working with a polynomial or other expression that has multiple useful representations, show the different forms to build understanding. Format them as a special block at the END of your response:

\`\`\`forms
{"standard": "x^2 + 5x + 6", "factored": "(x+2)(x+3)", "vertex": "(x + \\\\frac{5}{2})^2 - \\\\frac{1}{4}"}
\`\`\`

Only include a forms block when the student is specifically working with equations where multiple representations add insight.

## Step formatting
When listing steps, working, or any sequential items, always use the › symbol (a small arrow) as the bullet — never a hyphen or dash. For example:
› Expand the brackets
› Collect like terms
› Divide both sides by 2
Stay focused on mathematics. If a student strays off-topic, acknowledge briefly and redirect warmly — one gentle redirect is enough.

## Error correction
Never validate incorrect work. Acknowledge what was correct, name the specific error precisely, and guide the student to spot it themselves before explaining it. Do not say "great effort!" after an error.

## When a student asks for the answer directly
Ask what they have tried first. After two guided attempts, you may provide partial steps. Only give a complete solution after genuine attempts and hints.

## When a student is stuck after multiple hints
Zoom out — introduce a simpler analogy or a related easier problem, then bridge back.

## Tone
Speak naturally and directly. Use "we" and "let's" to frame the work as shared exploration. Keep responses focused — no unnecessary padding or filler.`;

// ── State ────────────────────────────────────────────────────────────────────
let messages = [];
let sessions = JSON.parse(localStorage.getItem('kay_sessions') || '[]');
let currentSessionId = null;
let isLoading = false;
let desmosCalc = null;
let graphOpen = false;
let graphExpressions = [];
let plottedExpressions = new Set();

// ── Desmos init ───────────────────────────────────────────────────────────────
function initDesmos() {
  if (desmosCalc) return;
  const el = document.getElementById('desmos-calc');
  desmosCalc = Desmos.GraphingCalculator(el, {
    expressions: true,
    settingsMenu: false,
    zoomButtons: true,
    border: false,
    keypad: false,
    fontSize: 14,
  });
}

function toggleGraph() {
  graphOpen = !graphOpen;
  const panel = document.getElementById('graph-panel');
  const btn = document.getElementById('graph-toggle-btn');
  panel.classList.toggle('open', graphOpen);
  btn.classList.toggle('active', graphOpen);
  if (graphOpen) {
    initDesmos();
    setTimeout(() => desmosCalc && desmosCalc.resize(), 310);
  }
}

function addToGraph(expressions, title) {
  const newExprs = expressions.filter(e => !plottedExpressions.has(e));
  if (newExprs.length === 0) return;
  if (!graphOpen) toggleGraph();
  initDesmos();
  newExprs.forEach(expr => {
    desmosCalc.setExpression({ id: 'expr_' + Date.now() + Math.random(), latex: expr });
    graphExpressions.push(expr);
    plottedExpressions.add(expr);
  });
  renderGraphSidebar();
  setTimeout(() => desmosCalc.resize(), 310);
}

function renderGraphSidebar() {
  const list = document.getElementById('graph-expr-list');
  if (graphExpressions.length === 0) {
    list.innerHTML = '<div style="font-size:11px;color:var(--ink-3);line-height:1.5">Kay will add equations here automatically, or type one into the graph directly.</div>';
    return;
  }
  list.innerHTML = graphExpressions.map((e, i) =>
    `<div class="graph-expr-item" onclick="highlightExpr(${i})" title="${e}">${e.length > 22 ? e.slice(0,22)+'…' : e}</div>`
  ).join('');
}

function highlightExpr(i) { /* future: zoom to expression */ }

function clearGraph() {
  if (desmosCalc) desmosCalc.setBlank();
  graphExpressions = [];
  plottedExpressions = new Set();
  renderGraphSidebar();
}





// ── Parse Kay's response for special blocks ───────────────────────────────────
function parseKayResponse(text) {
  let graphData = null;
  let formsData = null;
  let cleanText = text;

  // Extract graph block
  const graphMatch = text.match(/```graph\n([\s\S]*?)```/);
  if (graphMatch) {
    try { graphData = JSON.parse(graphMatch[1].trim()); } catch(e) {}
    cleanText = cleanText.replace(/```graph\n[\s\S]*?```/, '').trim();
  }

  // Extract forms block
  const formsMatch = text.match(/```forms\n([\s\S]*?)```/);
  if (formsMatch) {
    try { formsData = JSON.parse(formsMatch[1].trim()); } catch(e) {}
    cleanText = cleanText.replace(/```forms\n[\s\S]*?```/, '').trim();
  }

  return { cleanText, graphData, formsData };
}

// ── Render messages ───────────────────────────────────────────────────────────
function renderMessages() {
  const container = document.getElementById('messages');
  const empty = document.getElementById('empty-state');
  if (messages.length === 0) { container.style.display = 'none'; empty.style.display = 'flex'; return; }
  container.style.display = 'block';
  empty.style.display = 'none';
  container.innerHTML = messages.map((m, i) => messageHTML(m, i)).join('');
  container.querySelectorAll('.msg-bubble').forEach(el => {
    renderMathInElement(el, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false },
      ],
      throwOnError: false,
    });
  });
  // Set up eq forms tabs
  container.querySelectorAll('.eq-forms').forEach(el => {
    const tabs = el.querySelectorAll('.eq-form-tab');
    const body = el.querySelector('.eq-form-body');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        body.setAttribute('data-content', tab.dataset.content);
        body.innerHTML = tab.dataset.content;
        renderMathInElement(body, { delimiters: [{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}], throwOnError: false });
      });
    });
  });
  container.scrollTop = container.scrollHeight;
}

function classifyMessage(text) {
  const lower = text.toLowerCase().trim();

  // Affirmation — Kay confirming a correct answer
  const affirmPatterns = [
    /\bexactly\b/, /\bthat'?s (right|correct)\b/, /\bwell done\b/,
    /\bperfect(ly)?\b/, /\bspot on\b/, /\bnice work\b/, /\byou'?ve got it\b/,
    /\byes,? that'?s\b/, /\bcorrect\b/, /\bgreat (thinking|reasoning|work)\b/,
    /\byou'?re (right|correct)\b/, /\babsolutely\b/
  ];
  if (affirmPatterns.some(p => p.test(lower))) return 'affirmation';

  // Question — Kay asking the student something
  // Must end with ? or contain a clear question phrase
  const sentences = text.split(/[.!]/);
  const lastSentence = sentences[sentences.length - 1] || '';
  const hasQuestion = text.includes('?');
  const questionPhrases = [
    /what (do|did|does|is|are|would|can|could)/i,
    /how (do|did|does|would|can|could|might)/i,
    /can you (tell|show|explain|think|see|try)/i,
    /do you (know|think|see|understand|remember)/i,
    /why (do|did|does|is|would)/i,
    /where (do|did|does|is|are)/i,
    /which (of|one|step|approach)/i,
    /have you (tried|thought|considered)/i,
  ];
  if (hasQuestion || questionPhrases.some(p => p.test(text))) return 'question';

  return 'statement';
}

function messageHTML(m, idx) {
  const isKay = m.role === 'assistant';
  let bubbleContent = escapeAndFormat(m.content);
  let extraHTML = '';

  if (isKay) {
    const parsed = parseKayResponse(m.content);
    bubbleContent = escapeAndFormat(parsed.cleanText);

    // Classify message type and apply styling
    const msgType = classifyMessage(parsed.cleanText);
    if (msgType === 'question') {
      extraHTML = `<span class="msg-type-badge badge-question">
        <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Question
      </span>`;
    } else if (msgType === 'affirmation') {
      extraHTML = `<span class="msg-type-badge badge-affirmation">
        <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Correct
      </span>`;
    }

    // Graph button
    if (parsed.graphData) {
      const exprs = JSON.stringify(parsed.graphData.expressions);
      const title = parsed.graphData.title || '';
      extraHTML += `<button class="eq-graph-btn" onclick='addToGraph(${exprs}, "${title}")'>
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Show graph${title ? ': ' + title : ''}
      </button>`;

    }

    // Equation forms
    if (parsed.formsData) {
      const forms = parsed.formsData;
      const formKeys = Object.keys(forms);
      const firstKey = formKeys[0];
      const firstVal = forms[firstKey];
      const tabsHTML = formKeys.map((k, i) =>
        `<button class="eq-form-tab${i===0?' active':''}" data-content="$${forms[k]}$">${k.charAt(0).toUpperCase()+k.slice(1)}</button>`
      ).join('');
      extraHTML += `<div class="eq-forms">
        <div class="eq-forms-header">${tabsHTML}</div>
        <div class="eq-form-body" data-content="$${firstVal}$">$${firstVal}$</div>
      </div>`;
    }
  }

  const msgType = isKay ? classifyMessage(
    (() => { try { return parseKayResponse(m.content).cleanText; } catch(e) { return m.content; } })()
  ) : 'user';
  const bubbleClass = isKay
    ? (msgType === 'question' ? 'msg-bubble is-question'
      : msgType === 'affirmation' ? 'msg-bubble is-affirmation'
      : 'msg-bubble')
    : 'msg-bubble';

  return `<div class="message ${isKay ? 'kay' : 'user'}">
    <div class="msg-avatar ${isKay ? 'kay' : 'user'}">${isKay ? 'K' : 'Y'}</div>
    <div class="msg-content">
      <div class="msg-name">${isKay ? 'Kay' : 'You'}${extraHTML.includes('msg-type-badge') ? extraHTML.match(/<span class="msg-type-badge[^"]*">[\s\S]*?<\/span>/)?.[0] || '' : ''}</div>
      <div class="${bubbleClass}">${bubbleContent}</div>
      ${extraHTML.includes('msg-type-badge') ? extraHTML.replace(/<span class="msg-type-badge[\s\S]*?<\/span>/, '') : extraHTML}
    </div>
  </div>`;
}

function escapeAndFormat(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/<(?!\/?(?:br|b|i|em|strong))/g, '&lt;')
    .replace(/\n\n/g, '</p><p style="margin-top:9px">')
    .replace(/\n/g, '<br>')
    .replace(/(^|<br>)\s*[-–]\s+/g, '$1&#8250;&nbsp;');
}

function addTypingIndicator() {
  const c = document.getElementById('messages');
  c.style.display = 'block'; document.getElementById('empty-state').style.display = 'none';
  const d = document.createElement('div');
  d.className = 'typing-indicator'; d.id = 'typing';
  d.innerHTML = `<div class="msg-avatar kay">K</div><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}
function removeTypingIndicator() { const el = document.getElementById('typing'); if (el) el.remove(); }

// ── API ──────────────────────────────────────────────────────────────────────
const BACKEND_URL = 'https://math-tutor-kay.onrender.com';

async function callKay() {
  const response = await fetch(BACKEND_URL + '/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages }),
  });
  if (!response.ok) { const err = await response.json().catch(() => ({})); throw new Error(err?.error || `Server error ${response.status}`); }
  const data = await response.json();
  return data.reply || '';
}

// ── Send ─────────────────────────────────────────────────────────────────────
async function sendMessage(overrideText) {
  if (isLoading) return;
  const input = document.getElementById('msg-input');
  const text = overrideText || input.value.trim();
  if (!text) return;
  clearAlert();
  if (!overrideText) { input.value = ''; autoResize(input); }
  if (!currentSessionId) currentSessionId = Date.now().toString();
  messages.push({ role: 'user', content: text });
  renderMessages();
  addTypingIndicator();
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  if (messages.filter(m => m.role === 'user').length === 1) {
    document.getElementById('topic-label').textContent = text.slice(0, 42) + (text.length > 42 ? '…' : '');
  }
  try {
    const reply = await callKay();
    removeTypingIndicator();
    if (reply) { messages.push({ role: 'assistant', content: reply }); renderMessages(); saveCurrentSession(); renderSessions(); }
  } catch(err) {
    removeTypingIndicator(); messages.pop(); renderMessages();
    showAlert('Error: ' + err.message, 'error');
  } finally {
    isLoading = false; document.getElementById('send-btn').disabled = false; input.focus();
  }
}

function sendStarter(t) { sendMessage(t); }
function sendHint() {
  if (messages.length === 0) { showAlert('Start a problem first, then ask for a hint.', 'info', 2500); return; }
  sendMessage("I'm stuck — can you give me a hint without giving away the answer?");
}
function clearChat() { messages = []; currentSessionId = null; renderMessages(); document.getElementById('topic-label').textContent = 'Ready to learn'; clearAlert(); }

// ── Sessions ─────────────────────────────────────────────────────────────────
function newSession() { if (currentSessionId && messages.length > 0) saveCurrentSession(); currentSessionId = Date.now().toString(); messages = []; renderMessages(); renderSessions(); document.getElementById('topic-label').textContent = 'Ready to learn'; }
function saveCurrentSession() {
  if (!currentSessionId || messages.length === 0) return;
  const firstUser = messages.find(m => m.role === 'user');
  const title = firstUser ? firstUser.content.slice(0, 48) : 'Untitled';
  const idx = sessions.findIndex(s => s.id === currentSessionId);
  const obj = { id: currentSessionId, title, messages: [...messages] };
  if (idx >= 0) sessions[idx] = obj; else sessions.unshift(obj);
  if (sessions.length > 20) sessions = sessions.slice(0, 20);
  localStorage.setItem('kay_sessions', JSON.stringify(sessions));
}
function loadSession(id) {
  if (currentSessionId && messages.length > 0) saveCurrentSession();
  const s = sessions.find(s => s.id === id); if (!s) return;
  currentSessionId = id; messages = [...s.messages]; renderMessages(); renderSessions();
  const firstUser = messages.find(m => m.role === 'user');
  document.getElementById('topic-label').textContent = firstUser ? firstUser.content.slice(0,40)+'…' : 'Session';
}
function renderSessions() {
  document.getElementById('sessions-list').innerHTML = sessions.map(s =>
    `<div class="session-item ${s.id===currentSessionId?'active':''}" onclick="loadSession('${s.id}')" title="${s.title}">${s.title}</div>`
  ).join('');
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
let alertTimer;
function showAlert(msg, type, ms) { clearTimeout(alertTimer); const el = document.getElementById('alert-banner'); el.textContent = msg; el.className = 'alert ' + type; if (ms) alertTimer = setTimeout(clearAlert, ms); }
function clearAlert() { document.getElementById('alert-banner').className = 'alert'; }

// ── Init ─────────────────────────────────────────────────────────────────────
renderSessions();
renderMessages();
window.addEventListener('load', () => { if (messages.length > 0) renderMessages(); });
</script>
