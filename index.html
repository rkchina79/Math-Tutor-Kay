<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kay — Math Tutor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:       #1a1814;
    --ink-2:     #4a4640;
    --ink-3:     #8a857e;
    --paper:     #faf8f4;
    --paper-2:   #f2ede5;
    --paper-3:   #e8e0d4;
    --accent:    #c4602a;
    --accent-2:  #e8956a;
    --kay-bg:    #1a1814;
    --kay-text:  #f5f0e8;
    --radius:    14px;
    --mono:      'DM Mono', monospace;
    --sans:      'DM Sans', sans-serif;
    --serif:     'DM Serif Display', serif;
  }

  html, body {
    height: 100%;
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ── */
  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: 100vh;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--ink);
    color: var(--kay-text);
    display: flex;
    flex-direction: column;
    padding: 28px 20px 24px;
    border-right: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
  }

  .sidebar-header {
    margin-bottom: 32px;
  }

  .kay-name {
    font-family: var(--serif);
    font-size: 28px;
    color: #f5f0e8;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .kay-title {
    font-size: 11px;
    color: rgba(245,240,232,0.45);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 4px;
    font-weight: 400;
  }

  .sidebar-divider {
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 0 0 24px;
  }

  .sidebar-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.3);
    font-weight: 500;
    margin-bottom: 10px;
  }

  /* Session history */
  .sessions {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: none;
  }
  .sessions::-webkit-scrollbar { display: none; }

  .session-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 3px;
    transition: background 0.15s;
    font-size: 13px;
    color: rgba(245,240,232,0.6);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
  }

  .session-item:hover { background: rgba(255,255,255,0.06); color: rgba(245,240,232,0.9); }
  .session-item.active { background: rgba(196,96,42,0.25); color: #f5f0e8; }

  .new-session-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 10px 12px;
    background: rgba(196,96,42,0.15);
    border: 1px solid rgba(196,96,42,0.3);
    border-radius: 8px;
    color: var(--accent-2);
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 16px;
  }
  .new-session-btn:hover { background: rgba(196,96,42,0.25); }
  .new-session-btn svg { flex-shrink: 0; }

  /* API key area */
  .api-section { margin-top: auto; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.08); }

  .api-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.3);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .api-input-wrap { position: relative; }

  .api-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 9px 36px 9px 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: rgba(245,240,232,0.7);
    outline: none;
    transition: border-color 0.15s;
  }
  .api-input::placeholder { color: rgba(245,240,232,0.25); }
  .api-input:focus { border-color: rgba(196,96,42,0.5); }

  .api-save-btn {
    position: absolute;
    right: 8px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: rgba(245,240,232,0.35);
    cursor: pointer; padding: 2px;
    transition: color 0.15s;
  }
  .api-save-btn:hover { color: var(--accent-2); }

  /* ── Main chat area ── */
  .main {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    background: var(--paper);
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px 16px;
    border-bottom: 1px solid var(--paper-3);
    flex-shrink: 0;
  }

  .topic-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    background: var(--paper-2);
    border: 1px solid var(--paper-3);
    border-radius: 20px;
    font-size: 12px;
    color: var(--ink-2);
    font-weight: 400;
  }

  .topic-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .topbar-actions { display: flex; gap: 8px; }

  .hint-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    background: transparent;
    border: 1px solid var(--paper-3);
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 12px;
    color: var(--ink-2);
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 400;
  }
  .hint-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(196,96,42,0.04);
  }

  .clear-btn {
    padding: 7px 14px;
    background: transparent;
    border: 1px solid var(--paper-3);
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 12px;
    color: var(--ink-3);
    cursor: pointer;
    transition: all 0.15s;
  }
  .clear-btn:hover { border-color: var(--paper-3); color: var(--ink-2); background: var(--paper-2); }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 28px 12px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--paper-3); border-radius: 2px; }

  .message {
    display: flex;
    gap: 14px;
    margin-bottom: 24px;
    animation: fadeUp 0.25s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    margin-top: 2px;
  }

  .msg-avatar.kay {
    background: var(--ink);
    color: var(--kay-text);
    font-family: var(--serif);
    font-size: 15px;
  }

  .msg-avatar.user {
    background: var(--paper-3);
    color: var(--ink-2);
  }

  .msg-content { flex: 1; min-width: 0; }

  .msg-name {
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-3);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .msg-bubble {
    font-size: 14.5px;
    line-height: 1.75;
    color: var(--ink);
  }

  .message.user .msg-bubble {
    background: var(--paper-2);
    border: 1px solid var(--paper-3);
    border-radius: 2px 12px 12px 12px;
    padding: 12px 16px;
    display: inline-block;
    max-width: 80%;
  }

  .message.kay .msg-bubble {
    color: var(--ink);
  }

  /* KaTeX display */
  .msg-bubble .katex-display {
    margin: 12px 0;
    overflow-x: auto;
  }

  .msg-bubble code {
    font-family: var(--mono);
    font-size: 13px;
    background: var(--paper-2);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--accent);
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 14px;
    margin-bottom: 24px;
    align-items: flex-start;
  }

  .typing-dots {
    display: flex;
    gap: 5px;
    padding: 14px 4px 4px;
    align-items: center;
  }

  .typing-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--ink-3);
    animation: bounce 1.2s ease infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    text-align: center;
    gap: 12px;
  }

  .empty-name {
    font-family: var(--serif);
    font-size: 38px;
    color: var(--ink);
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .empty-sub {
    font-size: 14px;
    color: var(--ink-3);
    max-width: 340px;
    line-height: 1.6;
    font-weight: 300;
  }

  .starter-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 16px;
    max-width: 480px;
    width: 100%;
  }

  .starter-card {
    padding: 14px 16px;
    background: var(--paper-2);
    border: 1px solid var(--paper-3);
    border-radius: 10px;
    font-size: 13px;
    color: var(--ink-2);
    cursor: pointer;
    text-align: left;
    line-height: 1.45;
    transition: all 0.15s;
    font-family: var(--sans);
  }
  .starter-card:hover {
    border-color: var(--accent);
    color: var(--ink);
    background: rgba(196,96,42,0.04);
  }

  /* Input bar */
  .input-bar {
    padding: 16px 28px 20px;
    border-top: 1px solid var(--paper-3);
    flex-shrink: 0;
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--paper-2);
    border: 1.5px solid var(--paper-3);
    border-radius: var(--radius);
    padding: 10px 10px 10px 16px;
    transition: border-color 0.15s;
  }
  .input-wrap:focus-within {
    border-color: var(--accent);
    background: #fff;
  }

  .msg-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-family: var(--sans);
    font-size: 14.5px;
    color: var(--ink);
    resize: none;
    max-height: 140px;
    line-height: 1.6;
    min-height: 24px;
  }
  .msg-input::placeholder { color: var(--ink-3); }

  .send-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--ink);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  .send-btn:hover { background: var(--accent); }
  .send-btn:active { transform: scale(0.94); }
  .send-btn:disabled { background: var(--paper-3); cursor: not-allowed; }
  .send-btn svg { color: white; }

  .input-hint {
    font-size: 11px;
    color: var(--ink-3);
    margin-top: 8px;
    text-align: center;
  }

  /* Alert banner */
  .alert {
    margin: 0 28px 12px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 12.5px;
    display: none;
  }
  .alert.error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; display: block; }
  .alert.info  { background: var(--paper-2); border: 1px solid var(--paper-3); color: var(--ink-2); display: block; }

  /* Responsive */
  @media (max-width: 640px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .topbar, .messages, .input-bar { padding-left: 16px; padding-right: 16px; }
    .starter-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="kay-name">Kay</div>
      <div class="kay-title">Mathematics Tutor</div>
    </div>
    <div class="sidebar-divider"></div>

    <button class="new-session-btn" onclick="newSession()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New session
    </button>

    <div class="sidebar-label">Recent sessions</div>
    <div class="sessions" id="sessions-list"></div>

    <div class="api-section">
      <div class="api-label">Anthropic API key</div>
      <div class="api-input-wrap">
        <input class="api-input" type="password" id="api-key-input"
          placeholder="sk-ant-..." value=""
          onchange="saveApiKey(this.value)">
        <button class="api-save-btn" onclick="saveApiKey(document.getElementById('api-key-input').value)" title="Save">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="main">

    <div class="topbar">
      <div class="topic-pill">
        <div class="topic-dot"></div>
        <span id="topic-label">Ready to learn</span>
      </div>
      <div class="topbar-actions">
        <button class="hint-btn" onclick="sendHint()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          Give me a hint
        </button>
        <button class="clear-btn" onclick="clearChat()">Clear</button>
      </div>
    </div>

    <div id="alert-banner" class="alert"></div>

    <!-- Messages or empty state -->
    <div id="messages" class="messages" style="display:none"></div>

    <div id="empty-state" class="empty-state">
      <div class="empty-name">Hello, I'm Kay.</div>
      <div class="empty-sub">Your mathematics guide from counting to topology. What are we working through today?</div>
      <div class="starter-grid">
        <button class="starter-card" onclick="sendStarter(this.innerText)">I'm stuck on a problem — can you help me work through it?</button>
        <button class="starter-card" onclick="sendStarter(this.innerText)">Can you explain what a derivative actually means?</button>
        <button class="starter-card" onclick="sendStarter(this.innerText)">I need to understand fractions before moving on</button>
        <button class="starter-card" onclick="sendStarter(this.innerText)">Show me how proof by induction works</button>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-wrap">
        <textarea class="msg-input" id="msg-input"
          placeholder="Ask Kay a question, share your working, or describe where you're stuck…"
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
            <line x1="12" y1="19" x2="12" y2="5"/>
            <polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
    </div>

  </main>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────

const SYSTEM_PROMPT = `You are Kay, a mathematics tutor and learning guide. Your role is not simply to provide answers, but to help students genuinely understand mathematics — from the ground up, or at the frontier, depending on where they are.

## Personality
You are professionally warm and genuinely curious. You take real interest in understanding what each student already knows, where their thinking breaks down, and what mental model they are building. You ask thoughtful questions, listen carefully to how a student reasons, and respond to the student as an individual — not as a generic learner. You are patient, encouraging without being patronising, and intellectually honest. You celebrate genuine progress and are comfortable sitting with a student in confusion until the fog clears.

## Role
You are a facilitator of learning, not a solution dispenser. Your job is to guide students to mathematical understanding through questioning, scaffolding, and carefully chosen examples. When a student asks for an answer, your first instinct is to ask what they have tried, what they already know, or to offer a hint that moves them forward without doing the thinking for them.

## Knowledge scope
You have deep knowledge across the full spectrum of mathematics, including early numeracy, arithmetic, algebra, geometry, trigonometry, precalculus, calculus, linear algebra, differential equations, real and complex analysis, abstract algebra, topology, probability theory, statistics, and research-level mathematics.

You calibrate your language, notation, and depth of explanation precisely to the student's level.

## Teaching approach
1. Diagnose before teaching. Ask a brief question to gauge current understanding before explaining.
2. Guide with questions. Use the Socratic method. Pose questions that lead the student to discover the next step themselves.
3. Scaffold carefully. Break complex ideas into smaller steps. Confirm understanding at each step before moving forward.
4. Use concrete examples first. Introduce abstract concepts through specific, tangible examples before general rules.
5. Name and address confusion directly. Explore the source of confusion together.
6. Give full solutions sparingly. Only provide a complete worked solution when the student has made a genuine attempt and worked through hints.

## Formatting
When you write equations or mathematical expressions, wrap them in LaTeX delimiters so they render beautifully:
- Use $$...$$ for display equations (centred, on their own line)
- Use $...$ for inline math within a sentence

For example: The quadratic formula is $$x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}$$

## Topic scope
Stay focused on mathematics. If a student strays off-topic, acknowledge briefly and redirect warmly.

## Error correction
Never validate incorrect work. Acknowledge what was correct, name the specific error, and guide the student to spot it themselves before explaining it.

## Tone
Speak naturally and directly. Use "we" and "let's" to frame the work as a shared exploration. Keep responses focused — do not pad with unnecessary praise or filler.`;

let messages = [];
let sessions = JSON.parse(localStorage.getItem('kay_sessions') || '[]');
let currentSessionId = null;
let isLoading = false;

// ── API key ─────────────────────────────────────────────────────────────────

function getApiKey() {
  return localStorage.getItem('kay_api_key') || '';
}

function saveApiKey(val) {
  localStorage.setItem('kay_api_key', val.trim());
  showAlert('API key saved.', 'info', 1800);
}

// ── Sessions ────────────────────────────────────────────────────────────────

function newSession() {
  if (currentSessionId && messages.length > 0) saveCurrentSession();
  currentSessionId = Date.now().toString();
  messages = [];
  renderMessages();
  renderSessions();
  document.getElementById('topic-label').textContent = 'Ready to learn';
}

function saveCurrentSession() {
  if (!currentSessionId || messages.length === 0) return;
  const firstUser = messages.find(m => m.role === 'user');
  const title = firstUser ? firstUser.content.slice(0, 48) : 'Untitled session';
  const idx = sessions.findIndex(s => s.id === currentSessionId);
  const obj = { id: currentSessionId, title, messages: [...messages] };
  if (idx >= 0) sessions[idx] = obj; else sessions.unshift(obj);
  if (sessions.length > 20) sessions = sessions.slice(0, 20);
  localStorage.setItem('kay_sessions', JSON.stringify(sessions));
}

function loadSession(id) {
  if (currentSessionId && messages.length > 0) saveCurrentSession();
  const s = sessions.find(s => s.id === id);
  if (!s) return;
  currentSessionId = id;
  messages = [...s.messages];
  renderMessages();
  renderSessions();
  const firstUser = messages.find(m => m.role === 'user');
  document.getElementById('topic-label').textContent = firstUser ? firstUser.content.slice(0,40)+'…' : 'Session';
}

function renderSessions() {
  const list = document.getElementById('sessions-list');
  list.innerHTML = sessions.map(s => `
    <div class="session-item ${s.id === currentSessionId ? 'active' : ''}"
      onclick="loadSession('${s.id}')" title="${s.title}">
      ${s.title}
    </div>
  `).join('');
}

// ── Render messages ─────────────────────────────────────────────────────────

function renderMessages() {
  const container = document.getElementById('messages');
  const empty = document.getElementById('empty-state');

  if (messages.length === 0) {
    container.style.display = 'none';
    empty.style.display = 'flex';
    return;
  }

  container.style.display = 'block';
  empty.style.display = 'none';
  container.innerHTML = messages.map(m => messageHTML(m)).join('');

  // Render KaTeX in all bubbles
  container.querySelectorAll('.msg-bubble').forEach(el => {
    renderMathInElement(el, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$',  right: '$',  display: false },
      ],
      throwOnError: false,
    });
  });

  container.scrollTop = container.scrollHeight;
}

function messageHTML(m) {
  const isKay = m.role === 'assistant';
  return `
    <div class="message ${isKay ? 'kay' : 'user'}">
      <div class="msg-avatar ${isKay ? 'kay' : 'user'}">${isKay ? 'K' : 'Y'}</div>
      <div class="msg-content">
        <div class="msg-name">${isKay ? 'Kay' : 'You'}</div>
        <div class="msg-bubble">${escapeAndFormat(m.content)}</div>
      </div>
    </div>`;
}

function escapeAndFormat(text) {
  // Escape HTML except preserve LaTeX delimiters
  return text
    .replace(/&/g, '&amp;')
    .replace(/<(?!\/?(?:br|b|i|em|strong))/g, '&lt;')
    .replace(/\n\n/g, '</p><p style="margin-top:10px">')
    .replace(/\n/g, '<br>');
}

function addTypingIndicator() {
  const container = document.getElementById('messages');
  container.style.display = 'block';
  document.getElementById('empty-state').style.display = 'none';
  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.id = 'typing';
  div.innerHTML = `
    <div class="msg-avatar kay">K</div>
    <div class="typing-dots">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTypingIndicator() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

// ── API call ─────────────────────────────────────────────────────────────────

async function callKay() {
  const apiKey = getApiKey();
  if (!apiKey) {
    showAlert('Please enter your Anthropic API key in the sidebar.', 'error');
    return null;
  }

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1024,
      system: SYSTEM_PROMPT,
      messages: messages,
    }),
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err?.error?.message || `API error ${response.status}`);
  }

  const data = await response.json();
  return data.content?.[0]?.text || '';
}

// ── Send ─────────────────────────────────────────────────────────────────────

async function sendMessage(overrideText) {
  if (isLoading) return;
  const input = document.getElementById('msg-input');
  const text = overrideText || input.value.trim();
  if (!text) return;

  clearAlert();
  if (!overrideText) { input.value = ''; autoResize(input); }

  if (!currentSessionId) currentSessionId = Date.now().toString();

  messages.push({ role: 'user', content: text });
  renderMessages();
  addTypingIndicator();

  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  // Update topic label
  if (messages.filter(m => m.role === 'user').length === 1) {
    document.getElementById('topic-label').textContent = text.slice(0, 40) + (text.length > 40 ? '…' : '');
  }

  try {
    const reply = await callKay();
    removeTypingIndicator();
    if (reply) {
      messages.push({ role: 'assistant', content: reply });
      renderMessages();
      saveCurrentSession();
      renderSessions();
    }
  } catch (err) {
    removeTypingIndicator();
    messages.pop(); // remove user message on error
    renderMessages();
    showAlert('Error: ' + err.message, 'error');
  } finally {
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

function sendStarter(text) { sendMessage(text); }

function sendHint() {
  if (messages.length === 0) {
    showAlert('Start a problem first, then ask for a hint.', 'info', 2500);
    return;
  }
  sendMessage("I'm stuck — can you give me a hint without giving away the answer?");
}

function clearChat() {
  messages = [];
  currentSessionId = null;
  renderMessages();
  document.getElementById('topic-label').textContent = 'Ready to learn';
  clearAlert();
}

// ── Input helpers ────────────────────────────────────────────────────────────

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

// ── Alert ────────────────────────────────────────────────────────────────────

let alertTimer;
function showAlert(msg, type, ms) {
  clearTimeout(alertTimer);
  const el = document.getElementById('alert-banner');
  el.textContent = msg;
  el.className = 'alert ' + type;
  if (ms) alertTimer = setTimeout(clearAlert, ms);
}
function clearAlert() {
  document.getElementById('alert-banner').className = 'alert';
}

// ── Init ─────────────────────────────────────────────────────────────────────

document.getElementById('api-key-input').value = getApiKey();
renderSessions();
renderMessages();

// Auto-render KaTeX after it loads
window.addEventListener('load', () => {
  if (messages.length > 0) renderMessages();
});
</script>
